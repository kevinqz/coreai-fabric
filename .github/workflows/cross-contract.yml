name: Cross-contract (vs live catalog)

# Proves the fabric->catalog register lane still works against the LIVE catalog,
# without either repo depending on the other at runtime. Clones coreai-catalog,
# runs fabric's real register generator, and asserts the output passes the
# catalog's own validate + audit + io_contract invariant tests. A catalog schema
# or invariant change that fabric no longer satisfies turns this red — the drift
# alarm the boundary redteam flagged as missing.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, Mondays 07:00 UTC — catches catalog drift even with no fabric change.
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  cross-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install fabric + deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyyaml jsonschema pytest
      - name: Cross-contract check against live coreai-catalog
        run: python scripts/cross_contract_check.py
