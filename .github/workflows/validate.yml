# CI gate for coreai-fabric.
#
# NOTE: CI deliberately runs NO conversion. `coreai-fabric convert` requires
# macOS on Apple Silicon with Apple's Core AI toolchain (apple/coreai-torch),
# which hosted runners do not provide — and fabric never pretends otherwise.
# CI validates the recipe contract, the register generator, the tests, and
# that every command documented in the agent docs actually parses.
name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so scripts/check_gate_flip.py can diff against the PR base.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (test extras)
        run: pip install -e ".[test]"

      - name: Validate all recipes (schema + license triage, aggregated errors)
        run: coreai-fabric validate

      # RFC Phase 0d (F7 rule 1): refuse a same-commit gate relaxation + status
      # flip (the pi0fast precedent). Runs against origin/main...HEAD on PRs.
      - name: Gate-flip guard (no same-commit gate redefinition + status flip)
        run: python scripts/check_gate_flip.py --base origin/main

      # RFC F14/F15 (audit L3): the generated docs must match a fresh generation
      # (body-only, freshness stamp excluded) — a real committed-vs-drift guard,
      # not the old overwrite-then-check tautology. Reproduces on CI because the
      # measured numbers are durable in the recipes (H1/F6), not in gitignored build/.
      - name: Generated docs are in sync (scorecard + blocks-index)
        run: |
          python scripts/generate_scorecard.py --check
          python scripts/generate_blocks_index.py --check

      - name: Tests (recipe contract, register generator vs vendored catalog schemas, Gate A, doc-check)
        run: python -m pytest -q
