# coreai-opt quantization config — INT8 weight-only, symmetric ABSMAX (no
# clipping), per-block-32. Pass to `coreai.llm.export --compression-config`.
#
# Derived from Apple's own macOS int4 preset (coreai_models.export.presets), with
# dtype int4->int8 and qscheme symmetric_with_clipping->symmetric. The module
# exclusions (SDPA/RoPE/RMSNorm kept high-precision) are Apple's.
#
# Why int8-absmax and not the int4 preset: a root-cause study (2026-07-03,
# verified on Apple Silicon) measured Apple's int4-clipped preset at ~79% greedy argmax
# / 96% top-5 vs the fp16 reference on Qwen3-0.6B, while this int8 config reaches
# ~96% argmax / 100% top-5 / 100% margin-gated — essentially lossless, matching
# the community's int8 results. int4 does NOT survive on Qwen (the community
# measured the same); clipping additionally flips argmaxes on the fat-tailed LM
# head. This is the high-fidelity tier; int4 is the size-optimized tier.
quantization_config:
  execution_mode: eager
  global_config:
    op_state_spec:
      weight:
        dtype: int8
        qscheme: symmetric
        granularity:
          type: per_block
          block_size: 32
          axis: 1
    op_input_spec: null
    op_output_spec: null
  module_type_configs:
    coreai_models.primitives.macos.sdpa.SDPA: null
    coreai_models.primitives.macos.rope.RoPE: null
    coreai_models.primitives.macos.rms_norm.RMSNorm: null
    coreai_models.primitives.macos.rms_norm.RMSNormPlusOne: null
    coreai_models.primitives.macos.switch.SwitchLinear:
      module_state_spec:
        weight:
          dtype: int8
          qscheme: symmetric
          granularity:
            type: per_block
            block_size:
            - 1
            - 1
            - 1
            - 32
            axis: null
      op_input_spec: null
      op_output_spec: null
