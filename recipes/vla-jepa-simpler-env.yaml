id: vla-jepa-simpler-env
upstream:
  hf_repo: lerobot/VLA-JEPA-SimplerEnv
  revision: 8b9ec33f57d8cdc0e064873a637a1f92e3164e53
  license: apache-2.0
  license_terms: permissive
  pipeline_tag: robotics
  size_bytes: 6163225750
conversion:
  tool: models/vla_jepa/export.py
  min_tool_version: 0.4.1
  args:
    policy: lerobot/VLA-JEPA-SimplerEnv
    dtype: bfloat16
  quantization: none
  precision: bfloat16
  action:
    embodiment: simpler_env_bridge_rt1
    robot_required: true
    action_space:
      dim: 7
      max_action_dim: 7
      max_state_dim: 8
      chunk_size: 7
      convention: bridge_rt1_7dof_action_with_gripper
    sampling:
      kind: flow_matching
      num_steps: 4
      solver: euler
    normalization:
      stats_source: policy_preprocessor.json + policy_postprocessor.json (upstream); action
        normalization is MIN_MAX, visual normalization is IDENTITY per VLAJEPAConfig.
    graphs:
    - name: action_denoise_step
expected:
  bundle_files:
  - metadata.json
  - main.mlirb
  - main.hash
parity:
  gate_a:
    checks:
    - bundle_files_present
    - metadata_json_parses
    - metadata_matches_recipe
  gate_b:
    metric: action_parity
    threshold: 0.995
    tolerance: 0.001
    max_action_mae: 0.05
    max_relative_action_mae: 0.1
publish:
  hf_target_namespace: kevinqz
  repo_name: VLA-JEPA-SimplerEnv-CoreAI
