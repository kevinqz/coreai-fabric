  parameters: 3B
  architecture: transformer
  runner: CoreAIRunner
  tokenizer_required: true
  processor_required: true
status: verified
notes: 'VLA-JEPA SimplerEnv policy from the LeRobot VLA-JEPA collection. Upstream card: VLA-JEPA
  combines Qwen3-VL-2B-Instruct, V-JEPA2, and a flow-matching DiT action head; inference uses
  Qwen + the action head, while the JEPA world model is training-only. Contract from config:
  one 224x224 RGB camera (observation.images.image), no state input declared in input_features
  for this checkpoint, action_dim=7, chunk_size=7, n_action_steps=7, num_inference_timesteps=4,
  jepa_encoder_name=facebook/vjepa2-vitl-fpc64-256. The LeRobot docs say single-view datasets
  duplicate the view for the world model during training; inference conversion must still
  follow the policy input_features. Current verified asset covers the `action_denoise_step`
  lane only: real action-head weights were exported, lowered, and measured with Gate B
  action_parity. Host-owned Qwen preprocessing and `qwen_context` export remain a separate
  lane; see docs/vla-jepa-export-runbook.md.'
