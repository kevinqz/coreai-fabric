notes: >-
  SenseNova-Vision-7B-MoT (sensenova/SenseNova-Vision-7B-MoT @ ea5f0c52,
  arXiv:2607.06560) — a UNIFIED multimodal model built on BAGEL-7B-MoT that
  reformulates every computer-vision task (detection, OCR, keypoints, depth,
  surface-normals, segmentation, multi-view geometry) as text / image /
  mixed-image generation, with NO task-specific heads.

  INDEX-ONLY: upstream weights are CC-BY-NC-4.0 (non-commercial use only). Like
  GR00T's NVIDIA Open Model License, a non-commercial grant is NOT a permissive
  redistribution basis for fabric's publish lane, so fabric does NOT republish
  the weights — the deliverable is this REPRODUCIBLE recipe (run it against
  sensenova/SenseNova-Vision-7B-MoT) plus a measured Gate-B fidelity number.
  Public (not gated) but restricted; revisit for a hosted artifact only if the
  upstream relicenses commercially.

  ARCHITECTURE = MoT (Mixture of Transformers, NOT MoE): a SigLIP-so400m vision
  encoder on the understanding path (siglip_vision_model, hidden 1152, 27
  layers, 980px / patch-14) + a FLUX-style VAE on the generation path
  (ae.safetensors, 0.34GB) both feeding a Qwen2-7B decoder (Qwen2ForCausalLM:
  hidden 3584, 28 layers, 28 heads / 4 KV, intermediate 18944, rope_theta 1e6,
  vocab 152064) whose transformer runs TWO parallel modality-expert weight sets
  (understanding + generation) that share ONE global self-attention over the
  joint token sequence — "modality-as-expert", ~14.5B total params / 7B active,
  bf16 ema.safetensors (29.2GB). MoT is export-heavier than a plain LM: shared
  attention with per-modality QKV/FFN is a whole-model Class-B lane and the
  generation path also carries the VAE, so the full unified forward is a
  graph-split research-grade target — host-owned, revisit alongside
  lingbot-vla-v2's N-program split.

  DEPLOYABLE CORE = the SigLIP vision encoder (the proven graph_output_cosine
  ENCODER lane, same as lingbot-vision-vit-* / pulpie-orange): image
  [1,3,980,980] -> per-patch tokens, exported as ONE static-size .aimodel via
  models/sensenova/export.py; the host owns the MoT Qwen2 decoder + VAE + the
  de-tokenization / image decode. fp32; SDPA — inject a data-dependent all-true
  bool keep-mask if it lowers mask-free (macOS 27 FoldMultiplyIntoSDPAScale
  segfault). GATE B = graph_output_cosine (identical seeded images through the
  fp32 torch SigLIP vs the .aimodel, min cosine over n_obs>=8) — conversion
  fidelity, not task accuracy.

  STATUS: this is the validated index-only PLAN (mirrors how groot / molmoact2
  entered as drafts). The models/sensenova/{ref_export,export}.py driver is
  SCAFFOLDED as a DRAFT (mirrors the miril two-venv ExportedProgram lane; uses
  transformers SiglipVisionModel) — NOT YET RUN. It needs an on-device capture +
  iteration: the ViT weight-key prefix in the 29.2GB ema.safetensors and the
  exact SigLIP config are self-diagnosed at runtime (missing/unexpected keys).
  Upstream inference code: github.com/OpenSenseNova/SenseNova-Vision.
  HF pipeline_tag is depth-estimation; the deployable lane here is
  image-feature-extraction.
