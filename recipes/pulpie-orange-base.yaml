notes: 'pulpie-orange-base (feyninc/pulpie-orange-base @ d8f4eaab, apache-2.0) — a EuroBERT-610m
  token classifier that labels HTML tokens as content vs boilerplate (web content extraction
  / RAG cleanup; "Pareto-optimal models for cleaning up the web"). THE FIRST non-autoregressive
  encoder and the first token-classification model converted to Core AI by fabric. EuroBERT
  is a modern bidirectional encoder (RoPE + GQA 18/6 heads, 26 layers, hidden 1152, vocab
  128257) with custom_code; op-coverage PROVEN on coreai_torch 0.4.1 / coremltools 9.0 (encode-and-classify,
  no KV-cache). Exported via models/eurobert/export.py as ONE static-seq (64) .aimodel: (input_ids,
  attention_mask) -> per-token logits [1, 64, 2]. fp32 (2.4GB); the host owns the EuroBERT
  tokenizer. GATE B = graph_output_cosine (the encoder analog of the LLM logit-parity lane):
  identical seeded (input_ids, attention_mask) through the fp32 torch reference vs the .aimodel,
  min cosine over n_obs=8 — a conversion-fidelity metric, not a task-accuracy metric. Real
  conversion via models/eurobert/{export,parity}.py.'
