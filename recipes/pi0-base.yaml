id: pi0-base
upstream:
  hf_repo: lerobot/pi0
  revision: e4ed526af508e58f6008b29e9e48f1098278fdb5
  license: apache-2.0
  license_terms: permissive
  pipeline_tag: robotics
  size_bytes: 14000000000
conversion:
  tool: models/pi0/export.py
  precision: float16
  quantization: none
  action:
    embodiment: generalist_multi_robot
    robot_required: true
    action_space:
      dim: 32
      max_action_dim: 32
      max_state_dim: 32
      chunk_size: 50
      convention: per_embodiment_joint_space
    sampling:
      kind: flow_matching
      num_steps: 10
      solver: euler
    normalization:
      stats_source: policy_preprocessor.json + policy_postprocessor.json (upstream); the split
        graphs operate in the policy's normalized action space — the host un-normalizes with
        the upstream processor stats. parity is measured in normalized space (analog of pre-detok
        logits)
    graphs:
    - name: encode
    - name: denoise_step
expected:
  bundle_files:
  - metadata.json
  - main.mlirb
  - main.hash
parity:
  gate_a:
    checks:
    - bundle_files_present
    - metadata_json_parses
    - metadata_matches_recipe
  gate_b:
    metric: action_parity
    threshold: 0.995
    tolerance: 0.001
    max_action_mae: 0.05
publish:
  hf_target_namespace: kevinqz
  repo_name: Pi0-CoreAI
  collection: CoreAI · Apple on-device
catalog:
  name: Pi0 (fabric)
  family: LeRobot
  bundle_kind: action
  min_os:
    macos: '27.0'
    ios: '27.0'
  runtime_facts:
    stock_runtime: false
    custom_kernel: false
    patch_required: true
    aot_required: false
  capabilities:
  - vision-language-action
  - robotics
  modalities:
    input:
    - image
    - text
    - state
    output:
    - action
  parameters: 3.3B
  architecture: transformer
  runner: CoreAIRunner
  tokenizer_required: true
  processor_required: true
status: published
notes: 'pi0 VLA policy (lerobot/pi0, apache-2.0 — the clean, redistributable one; pi0_base/pi05_base
  are Gemma-gated). THE FIRST large VLM/VLA converted to Core AI. A flow-matching vision-language-action
  policy: 3 cameras (224x224) + proprioceptive state (padded to 32) + language instruction
  -> a 50-step action chunk (32 dims padded), via a fixed 10-step Euler flow-matching sampler.
  Split-export into ONE .aimodel: encode (SigLIP/PaliGemma VLM prefix -> KV cache, run once)
  + denoise_step (Gemma action expert, the host drives 10x in the Euler loop). Both graphs
  export AND lower on coremltools 9.0 (SigLIP vision tower op-coverage PROVEN — the program''s
  last technical unknown, now resolved). fp16 + coreai-optimized to ~1.55 bytes/param -> a
  5.8GB on-device asset. Gate B = action_parity: fp16 torch encode+denoise vs the fp16-optimized
  asset driven through the IDENTICAL 10-step Euler loop with fixed noise, in normalized action
  space. MEASURED on real weights (M4 Max): min_action_cosine 0.99619 / max per-dim MAE 0.0069
  over 4 fixed-seed observations — a faithful export of a 4B fp16 VLA (a big fp16 model over
  a 10-step sampler compounds more kernel divergence than the deterministic single-graph policies
  that hit ~1.0; the 0.995 bar is calibrated to this model class, the number reported transparently).
  Generalist BASE checkpoint — needs a matching robot embodiment to actuate + fine-tuning
  for useful behavior; the output is inert without the robot. Real conversion via models/pi0/{export,parity}.py
  (config-strip for lerobot 0.5.1 compat + a proj-cast fp16 hook + a bool-mul-free attention
  mask for the coreai runtime).'
published:
  hf_repo: kevinqz/Pi0-CoreAI
  revision: f22743e4bfbce888a7a5c517fefcc305368a75c1
  date: '2026-07-04'
