notes: 'Diffusion Policy (Chi et al. 2023) — lerobot/diffusion_pusht, apache-2.0. A MULTI-STEP
  visuomotor policy: 1 camera (96x96) + agent-pos state (2) over 2 obs steps -> a horizon-16
  action trajectory (2 dims), sampled by a 100-step DDPM denoiser (conditional 1D U-Net, resnet18
  + spatial-softmax vision). SPLIT export: an `encode` graph (obs -> global conditioning,
  run once) + a `denoise_step` graph (host drives it 100x in the DDPM loop) in ONE .aimodel.
  The N-step sampler + un-normalization run in host code — the tiny, VLM-free analog of pi0''s
  flow-matching loop, proving the split-export sampler lane before pi0. Gate B = action_parity:
  the converted split-export driven by a fixed deterministic DDPM host loop vs the torch reference
  under the IDENTICAL loop, isolating numerical export fidelity (NOT sampler stochasticity
  or task success). PushT is a 2D planar pushing sim task — needs the sim/robot to actuate;
  the output is inert alone.'
