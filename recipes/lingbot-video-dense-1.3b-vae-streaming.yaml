notes: 'LingBot-Video Dense 1.3B — the STREAMING (subsequent-chunk) VAE decoder, the companion
  to the published first-chunk VAE (lingbot-video-dense-1.3b). Together they give CONTINUOUS
  video decode: the host decodes chunk 0 with the first-chunk asset, then loops THIS asset
  feeding the causal conv cache forward. apache-2.0 -> PUBLISHABLE. The VAE is shared across
  the LingBot video family (world-v2 + video-dense + video-moe, byte-identical weights), so
  this one streaming asset serves all three.

  DEPLOYABLE GRAPH = one subsequent chunk: (z_chunk [1,16,1,Hl,Wl], 32 cache_in tensors) ->
  (frames [1,3,4,Hl*8,Wl*8], 32 cache_out tensors), first_chunk=False. The WAN AutoencoderKLWan
  decoder threads a causal conv cache (feat_map) across chunks; this ships it as 32-tensor
  graph I/O (6 distinct shapes, ~155MB fp32 state; 33 conv slots, 1 un-cached None baked).
  Host owns un-normalization (latents_mean/std), frame assembly, and looping cache_out ->
  cache_in. models/lingbotvideo/vae_streaming_export.py.

  BUILT + GATE B MEASURED (2026-07-09, coreai-torch 0.4.1 / coremltools 9.0): min graph_output_cosine
  0.99999999999896 / median 0.99999999999901 over n_obs=8 (torch subsequent-chunk decode with
  feat_cache threaded vs the .aimodel over seeded (chunk, steady-state-primed cache) states).
  Asset ~293MB fp32, LOADS OK, single program. The steady-state cache (all 32 tensors) is
  reached after first_chunk + one subsequent chunk; only tensor slots are threaded (non-tensor
  None slots baked). Gate B on the decoded frames.'
