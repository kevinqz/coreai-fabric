notes: 'EO-1 — a LeRobot v0.6.0 embodied VLA (IPEC-COMMUNITY/EO-1-3B @ fe0a015d, MIT). Qwen2.5-VL-3B
  backbone + a flow-matching action head; the action denoise runs INSIDE the VLM at `<|action|>`-token
  positions (coupled, num_action_layers 2), so there is no small separable head — the deployable
  graph is the WHOLE Qwen2.5-VL LM forward. This asset ships the `action_denoise_step`: given
  the host-embedded prefix (`inputs_embeds`, VL+text+state — bypassing the vision tower) plus
  noisy action tokens + time, it runs embed_suffix → the 36-layer Qwen2.5 LM (use_cache=False)
  → action_out_proj → velocity. The host owns embed_prefix (vision/text/state embedding),
  the Euler loop (num_steps=10), and un-normalization. INT8 weight-only (torchao): the whole
  ~3.77B VLM would be ~7.5GB fp16; int8 makes it ~2.8GB which loads on the ANE. Qwen2.5-VL
  RoPE is real-valued (no complex-dtype issue). GATE B = graph_output_cosine (velocity torch-ref
  vs the int8 .aimodel over seeded inputs incl. synthetic VL prefix embeds; min cosine 0.99999999893).
  action_dim 32, chunk 16. Real conversion via models/eo1/export.py (loads EO1VisionFlowMatchingModel
  via trust_remote_code).'
