  are documentation-only (the registry preset wins). Assets serialize with minimum_os v27,
  so Swift-runner deployment needs macOS/iOS 27+; converting + Python-runtime execution work
  on macOS 26. Status committed as draft: converted/verified describe disposable local build/
  state. See docs/validation-log.md.'
