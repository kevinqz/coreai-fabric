# coreai-fabric recipe — Qwen3 0.6B (LLM seed recipe, PRODUCTION path)
# Status: draft in the committed tree. The PRODUCTION exporter was executed for
# real on 2026-07-03 (macOS 26.6, M4 Max) — `coreai.llm.export qwen3-0.6b`
# produced a 320 MB 4bit KV-cache chat asset (embedded tokenizer + chat
# template, assetVersion 2.0); Gate A passed. Gate B (benchmark_accuracy) is
# BLOCKED UPSTREAM: Apple's coreai.llm.eval ships as a stub ("Evaluation support
# is coming soon") in coreai-models 0.1.0, and the stateful KV-cache asset can't
# be scored by fabric's static-graph runner. See docs/validation-log.md.
id: qwen3-0.6b
upstream:
  hf_repo: Qwen/Qwen3-0.6B
  revision: c1899de289a04d12100db370d81485cdf75e47ca
  license: apache-2.0
  license_terms: permissive
  pipeline_tag: text-generation
  size_bytes: 4522815806
conversion:
  # Production path: Apple's coreai.llm.export with the model's registry
  # short-name auto-resolves the TESTED 4bit preset (verified 2026-07-03).
  # Install: git clone apple/coreai-models && pip install ./coreai-models/python
  tool: coreai.llm.export
  apple_registry_name: qwen3-0.6b
  min_tool_version: 0.4.1
  args:
    platform: macOS
  # Documentation only — the registry preset resolves the real values
  # (4bit / float16 / 8192 max context, per coreai.model.registry).
  quantization: 4bit
  precision: float16
expected:
  format_version: '2.0'
  bundle_files:
  - metadata.json
  - main.mlirb
  - main.hash
parity:
  gate_a:
    checks:
    - bundle_files_present
    - metadata_json_parses
    - metadata_matches_recipe
  gate_b:
    # Correct metric for a quantized production asset (task accuracy vs upstream)
    # — blocked until Apple ships coreai.llm.eval; verify reports not_run.
    metric: benchmark_accuracy
    threshold: 0.999
    tolerance: 0.02
publish:
  hf_target_namespace: kevinqz
  repo_name: Qwen3-0.6B-CoreAI
catalog:
  name: Qwen3 0.6B (fabric)
  family: Qwen
  bundle_kind: llm
  min_os:
    macos: '27.0'
    ios: '27.0'
  # Runtime facts describe the clean coreai-fabric-llm-export PROCESS (which fabric
  # controls), not unverified on-device performance: a clean coreai-torch export
  # produces a standard .aimodel with no zoo-style source patch (patch_required),
  # no custom Metal kernel (custom_kernel), and no separate AOT step — the export IS
  # the compile (aot_required). It targets the stock CoreAIRunner (stock_runtime).
  runtime_facts:
    stock_runtime: true
    custom_kernel: false
    patch_required: false
    aot_required: false
  capabilities:
  - chat
  - text-generation
  modalities:
    input:
    - text
    output:
    - text
  parameters: 0.6B
  architecture: transformer
  runner: CoreAIRunner
  tokenizer_required: true
  processor_required: false
status: draft
notes: 'Fabric-native float16 conversion of Qwen3-0.6B. Distinct from the catalog''s existing
  official-qwen3-0-6b entry (int4 palettized, converted via Apple''s official recipe by the
  zoo). VALIDATED ON REAL HARDWARE 2026-07-03 (Apple M4 Max, macOS 26.6): coreai-fabric-llm-export
  (coreai-torch 0.4.1 + coreai-core 1.0.0b2 + transformers 4.57.3 + torch 2.11.0) converted
  this upstream at the pinned revision into a 1.1 GB static-graph .aimodel (main.mlirb/main.hash/metadata.json,
  assetVersion 2.0); Gate A passed; Gate B was MEASURED with coreai-fabric-parity-runner and
  honestly FAILED the 0.999 bar (min per-token logit cosine 0.99661 vs fp32 reference, greedy
  divergence observed) — see docs/validation-log.md for the full reports. Status is committed
  as draft: converted/verified describe disposable local build/ state, and parity has not
  passed. The bundle is a static (1,96) logits graph, NOT Apple''s KV-cache chat layout; a
  production chat asset needs coreai.llm.export from an apple/coreai-models checkout. Assets
  serialize with minimum_os v27, so Swift-runner deployment requires macOS/iOS 27+; converting
  and Python-runtime execution work on macOS 26.6. Runtime facts (stock_runtime/custom_kernel/patch_required/aot_required)
  are declared from the clean-export process fabric controls, not from on-device Swift verification,
  which is still pending.'
