notes: 'PRODUCTION path — Apple''s coreai.llm.export with registry preset qwen3-0.6b
  (resolves 4bit / 8192 ctx). VALIDATED ON REAL HARDWARE 2026-07-03 (Apple M4 Max, macOS
  26.6): produced a ~320 MB 4bit STATEFUL KV-cache chat asset (state_names keyCache/valueCache,
  embedded tokenizer + Qwen3 chat template, assetVersion 2.0); Gate A passed. Gate B
  (benchmark_accuracy) is not_run — blocked upstream: Apple''s coreai.llm.eval is a stub in
  coreai-models 0.1.0 (''Evaluation support is coming soon''), and a static-graph runner cannot
  score a stateful asset. quantization/precision are documentation-only (the registry preset
  wins). Assets serialize with minimum_os v27, so Swift-runner deployment needs macOS/iOS 27+;
  converting + Python-runtime execution work on macOS 26.6. Status committed as draft:
  converted/verified describe disposable local build/ state. See docs/validation-log.md.'
