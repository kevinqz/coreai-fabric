notes: 'SmolVLA VLA policy for the SO-ARM101 (the ~US$100 open-source LeRobot arm that plugs
  into a Mac over USB) — the compact, deployable on-device alternative to the pi0/pi05 SO-ARM101
  models. SmolVLA = a SmolVLM2-500M VLM + a Gemma-style action expert, same flow-matching
  Euler loop as pi0 (chunk 50, 6-DOF actions padded to 32, 10-step Euler): 3 cameras (512x512)
  + proprioceptive state + a language instruction -> a 50-step action chunk. Split-export
  into ONE .aimodel: encode (SmolVLM2 prefix -> 241-token KV cache) + denoise_step (expert,
  host drives 10x). fp32, coreai- optimized. Upstream edge-inference/smolvla-so101-pick-orange
  (apache-2.0, base lerobot/smolvla_base). IMPORTANT FIDELITY NOTE: SmolVLM2''s vision graph
  has an op that specializes catastrophically when torch.export traces it with degenerate
  (all-zero / identical) camera images — the lowered encode then produces a plausible KV cache
  for synthetic inputs but a CATASTROPHICALLY wrong one for real images (action cosine 0.02).
  fabric fixes this by tracing AND measuring parity with 3 DISTINCT realistic ([-1,1]) images
  (natural_image). Gate B (action_parity, 16 realistic obs, identical 10-step Euler loop,
  fixed noise, normalized space, global-RMS MAE guard): min chunk-cosine 0.9997, mean 0.9999.
  HONEST CAVEAT: on an out-of-domain photo stress test (natural cat/bee/coco photos) the min
  dips to 0.991 (diffuse per-layer cache accumulation in the SmolVLM2 layers, worst at deep
  layers) — in-domain SO-101 workspace imagery sits between. Needs a calibrated SO-ARM101
  to actuate. Real conversion via models/smolvla/{export,parity}.py.'
