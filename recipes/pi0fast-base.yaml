notes: 'pi0-FAST generalist VLA base policy (lerobot/pi0fast-base @ acbfee34) — the FIRST
  AUTOREGRESSIVE VLA in the catalog (pi0/pi05/SmolVLA are flow-matching). ONE PaliGemma-2B
  causal LM (no action expert, no flow-matching): actions become discrete FAST tokens (host-side
  DCT+BPE via the ungated lerobot/fast-action-tokenizer), the gemma decoder generates them
  autoregressively (greedy), and the host FAST-detokenizes to a 50-step action chunk. Embeds
  PaliGemma/Gemma weights, so this is a Gemma Model Derivative — redistributed under the Gemma
  Terms of Use with the mandated NOTICE + modification notice + Prohibited Use Policy reference,
  and the HF repo is GATED (recipients accept the terms). Split-export into ONE .aimodel:
  `encode` (SigLIP x3 + gemma prefix -> PREFILLS a fixed-max KV cache + first token, run once
  per obs) + `decode_step` (a StaticCache O(1)/step decode — one token forward, writes its
  K/V at cache_position via a functional index_copy, ~10s/token on-device). 3 cameras (224x224)
  + proprioceptive state (in the text prompt) + language instruction. fp16 + coreai-optimized.
  GATE B — AUTOREGRESSIVE GREEDY ACTION-TOKEN PARITY (the FAST tokens are the model''s entire
  output; the detokenizer is a fixed deterministic host transform, so matching tokens => matching
  actions — the same principle as the LLM greedy_parity lane): pooled **0.925** vs the fp16
  torch reference (teacher-forced, 20 steps). Per-obs: a DIVERSE observation scores **1.0**
  (free-running bit-locked all 20 steps — the lowering reproduces the reference exactly),
  while a LOW-ENTROPY REPETITIVE observation scores 0.85 — the sub-1.0 is near-tie argmax
  flips where the model itself is uncertain (fp16 rounding), NOT a lowering defect (a defect
  would fail the diverse obs too). Same honest class as VibeThinker (0.953); fabric reports
  the raw number. Observations are synthetic (distinct 1/f natural images + fixed language
  tokens) — a conversion-fidelity metric, not a task-success metric. Generalist BASE checkpoint:
  needs a matching robot embodiment + fine-tuning to actuate; the output is inert without
  the robot. Real conversion via models/pi0fast/{export,parity}.py (StaticCache deployable
  lane).'
