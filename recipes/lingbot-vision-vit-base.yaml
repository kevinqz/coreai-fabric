notes: 'LingBot-Vision ViT-B/16 (robbyant/lingbot-vision-vit-base @ f606f8c6, apache-2.0)
  — a self-supervised vision backbone for dense spatial perception (depth / segmentation features).
  Frozen ViT-B/16 (embed_dim 768); same lane as lingbot-vision-vit-small (SDPA attention,
  op-coverage proven). Exported via models/lingbot/export.py as ONE static-size .aimodel:
  image [1,3,512,512] -> normalized per-patch tokens [1, 1024, 768]. fp32; the host owns image
  preprocessing (resize to 512, ImageNet mean/std, patch 16). GATE B = graph_output_cosine
  (identical seeded images through the fp32 torch backbone vs the .aimodel, min cosine over
  n_obs=8) — conversion fidelity, not task accuracy. Upstream model class + weights via github.com/robbyant/lingbot-vision
  (only model.pt on HF). Real conversion via models/lingbot/{export,parity}.py.'
