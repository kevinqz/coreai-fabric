conversion:
  tool: models/pi05/export.py
  precision: float16
  quantization: none
  action:
    embodiment: so_arm100_so101
    robot_required: true
    action_space:
      dim: 32
      max_action_dim: 32
      max_state_dim: 32
      chunk_size: 50
      convention: per_embodiment_joint_space
    sampling:
      kind: flow_matching
      num_steps: 10
      solver: euler
    normalization:
      stats_source: policy_preprocessor.json + policy_postprocessor.json (upstream); the split
        graphs operate in the policy's normalized action space — the host un-normalizes with
        the upstream processor stats. parity measured in normalized space (analog of pre-detok
        logits)
    graphs:
    - name: encode
    - name: denoise_step
expected:
  bundle_files:
  - metadata.json
  - main.mlirb
  - main.hash
parity:
  gate_a:
    checks:
    - bundle_files_present
    - metadata_json_parses
    - metadata_matches_recipe
  gate_b:
    metric: action_parity
    threshold: 0.995
    tolerance: 0.001
    max_action_mae: 0.05
    max_relative_action_mae: 0.1
