status: published
notes: 'pi0.5 (pi05) generalist VLA base — the Gemma-licensed release (lerobot/pi05_base).
  pi0.5 co-trains on robot demos + large-scale multimodal data for open-world generalization;
  needs a matching robot embodiment + fine-tuning to actuate. UNLIKE the apache Pi05-Folding
  (chunk 30, no state), this base is chunk 50 WITH proprioceptive state — but pi0.5 folds
  the state INTO the language-token prefix (200 tokens) rather than a separate state input,
  so encode takes 3 cameras (224x224) + a 200-token prompt (instruction + discretized state)
  and denoise_step is stateless. Split-export into ONE .aimodel: encode (SigLIP/PaliGemma
  VLM prefix -> KV cache) + denoise_step (Gemma action expert, host drives a fixed 10-step
  Euler flow-matching loop). Gemma Model Derivative — redistributed under the Gemma Terms
  (gated repo + NOTICE). Gate B = action_parity vs the fp16 torch reference through the identical
  10-step Euler loop, fixed noise, normalized space, with the global-RMS normalized-MAE guard.
  Real conversion via models/pi05/{export,parity}.py (PI05_CHUNK=50 PI05_TOK=200 -> prefix_len
  968).'
