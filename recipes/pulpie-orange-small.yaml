notes: >-
  pulpie-orange-small (feyninc/pulpie-orange-small @ 15ead335) — the SMALLEST of the
  pulpie "cleaning up the web" family, an EuroBERT-210m token classifier labelling
  HTML tokens content-vs-boilerplate (web extraction / RAG cleanup). Same
  non-autoregressive encoder lane as the registered pulpie-orange-base / -large:
  EuroBERT is a modern bidirectional encoder (RoPE + GQA, custom_code); exported via
  models/eurobert/export.py as ONE static-seq (64) .aimodel — (input_ids,
  attention_mask) -> per-token logits [1,64,2]. fp32; the host owns the tokenizer.
  GATE B = graph_output_cosine (models/eurobert/parity.py): identical seeded
  (input_ids, attention_mask) through the fp32 torch reference vs the .aimodel, min
  cosine over n_obs=8 — conversion fidelity, not task accuracy.

  BUILT + GATE B MEASURED (2026-07-08, coreai-torch 0.4.1 / coremltools 9.0):
  min graph_output_cosine 0.99999999999174 / median 0.99999999999451 over n_obs=8
  (EuroBERT-210m, 2 labels, seq 64). Loads on the runtime. Asset + parity JSON under
  build/ (gitignored). Status verified (index-only — not published, see below).

  INDEX-ONLY: unlike pulpie-orange-base/-large (apache-2.0), the SMALL checkpoint is
  cc-by-nc-4.0 (non-commercial) — a non-commercial grant is not a redistribution
  basis for fabric's publish lane, so fabric does NOT republish the weights. The
  deliverable is this reproducible recipe + a measured Gate-B number; revisit for a
  hosted artifact only if upstream relicenses commercially.
