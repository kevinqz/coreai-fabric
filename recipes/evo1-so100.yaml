conversion:
  tool: models/evo1/export.py
  min_tool_version: 0.4.1
  args:
    weights: build/_evo1/model.safetensors
  quantization: none
  precision: float32
  action:
    embodiment: so100_single_arm
    robot_required: true
    action_space:
      dim: 7
      max_action_dim: 7
      max_state_dim: 7
      chunk_size: 16
      convention: per_embodiment_joint_space
    sampling:
      kind: flow_matching
      num_steps: 10
      solver: euler
    normalization:
      stats_source: train_config.json (upstream); the split graph operates in the policy's
        normalized action space — the host un-normalizes with the upstream processor stats.
        parity is measured in normalized space.
    graphs:
    - name: action_denoise_step
expected:
