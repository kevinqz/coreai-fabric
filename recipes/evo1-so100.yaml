notes: 'EVO1 SO-100 VLA policy (Beilinghamburger/evo1_so100_vla @ 58c61206, apache-2.0) —
  the FIRST LeRobot v0.6.0 policy converted to Core AI. EVO1 = InternVL3-1B VL embedder +
  a flow-matching DiT action head (the pi0/VLA-JEPA split discipline). This asset ships the
  deployable CORE — the `action_denoise_step` velocity graph (embed_dim 896, 8 transformer
  blocks + category-specific MLP + sinusoidal time PE + state encoder); op-coverage PROVEN
  on coreai_torch 0.4.1 / coremltools 9.0. The host owns the InternVL3 VL embedding (context),
  the Euler loop (num_steps=10), and un-normalization — a separate context lane, like VLA-JEPA''s
  qwen_context. fp32; action_dim 7 (SO-100 = 6 joints + gripper), chunk_size 16 (dims verified
  against the checkpoint tensors, NOT the generic Evo1Config defaults). MPSGraph workaround:
  the cross-attention is exported with a data-dependent all-False key_padding_mask — loading
  a mask-free SDPA .aimodel SEGFAULTs the macOS-27/Xcode-27-beta MetalPerformanceShadersGraph
  FoldMultiplyIntoSDPAScale pass (ablation-proven; a constant mask gets folded back and re-crashes,
  so the mask must be data-dependent). GATE B = action_parity: fp32 torch action head vs the
  .aimodel driven through the IDENTICAL Euler loop with fixed synthetic VL context + fixed
  noise, in normalized action space — a conversion-fidelity metric, not task success. Generalist
  BASE checkpoint: needs a matching robot + fine-tuning to actuate; the output is inert without
  the robot. Real conversion via models/evo1/{export,parity}.py (flow_matching.py imported
  standalone; loads model.action_head.*).'
