  bundle_files:
  - metadata.json
  - main.mlirb
  - main.hash
parity:
  gate_a:
    checks:
    - bundle_files_present
    - metadata_json_parses
    - metadata_matches_recipe
  gate_b:
    metric: action_parity
    threshold: 0.995
    tolerance: 0.001
    max_action_mae: 0.05
    max_relative_action_mae: 0.1
