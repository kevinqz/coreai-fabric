id: molmoact2-libero
upstream:
  hf_repo: lerobot/MolmoAct2-LIBERO-LeRobot
  revision: 4820debf9b04a9c9e49bf041f956329cddb5f15a
  license: unspecified
  license_terms: restricted
  pipeline_tag: robotics
  size_bytes: 11000000000
conversion:
  tool: models/molmoact2/export.py
  min_tool_version: 0.4.1
  args:
    weights: build/_molmoact2/action_expert.safetensors
  quantization: float16
  precision: float32
  action:
    embodiment: libero_2cam_arm
    robot_required: true
    action_space:
      dim: 32
      max_action_dim: 32
      chunk_size: 10
      convention: per_embodiment_joint_space
    sampling:
      kind: flow_matching
      num_steps: 8
      solver: euler
    normalization:
      stats_source: norm_stats.json (upstream, norm_tag="libero") + policy_pre/postprocessor;
        the split graph operates in the policy's normalized action space — the host un-normalizes.
        parity is measured in normalized space.
    graphs:
    - name: action_denoise_step
expected:
  format_version: '2.0'
  bundle_files:
  - metadata.json
  - main.mlirb
  - main.hash
parity:
  gate_a:
    checks:
