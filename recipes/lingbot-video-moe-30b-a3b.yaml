notes: 'LingBot-Video MoE 30B-A3B (robbyant/lingbot-video-moe-30b-a3b @ f2e538f6, apache-2.0)
  — the flagship Mixture-of-Experts member of the LingBotVideoPipeline family: ~30B total
  / ~3B active ("A3B"), ~3x faster inference via grouped-expert execution, T2I / T2V / TI2V
  + a refiner. ~130GB (13 transformer shards). PUBLISHABLE (Apache-2.0).

  DEPLOYABLE CORE = the AutoencoderKLWan VAE DECODER, the SAME lane as lingbot-video-dense-1.3b
  / lingbot-world-v2 (identical VAE config family) — built via models/lingbotvideo/export.py
  --weights build/_lingbotvideo/moe_vae.safetensors: latent [1,16,1,60,104] -> frames [1,3,1,480,832],
  ONE static fp32 .aimodel, single program. GATE B = graph_output_cosine on decoded pixels.
  Only the vae/ safetensors is fetched; the 130GB DiT stays out of the build.

  BUILT + GATE B MEASURED (2026-07-08, coreai-torch 0.4.1 / coremltools 9.0): min graph_output_cosine
  0.99999999999941 / median 0.99999999999941 over n_obs=8 (fp32 torch AutoencoderKLWan first-chunk
  decoder vs fp32 .aimodel; latent [1,16,1,60,104] -> frames [1,3,1,480,832]). One fp32 program
  ~286MB, LOADS OK. This repo''s own vae/ safetensors was fetched and is BYTE-IDENTICAL (SHA256
  d6e524b3...) to lingbot-world-v2 + lingbot-video-dense-1.3b — the LingBot family ships ONE
  AutoencoderKLWan; the same number falls out, as expected. PUBLISHABLE (Apache-2.0) as kevinqz/LingBot-Video-MoE-30B-A3B-CoreAI.
  Only the VAE decoder is deployed here; the 30B MoE DiT remains the research-grade graph-split
  below.

  DiT 30B MoE = host-owned RESEARCH-GRADE graph-split target — a much larger sibling of the
  lingbot-vla-v2 dense-MoE split (30B, 13 shards, grouped experts). Far above the 0x10004
  per-program complexity ceiling; needs an N-program split with the MoE dense-rewrite + sequential
  block loading proven on lingbot-vla-v2. Multi-session, large download. UMT5 text encoder
  = trivial reuse encoder lane.'
