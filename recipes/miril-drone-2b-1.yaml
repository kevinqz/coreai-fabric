notes: >-
  Miril-Drone-2B-1 (MirilAI/Miril-Drone-2B-1 @ 40bde4fe, apache-2.0) — an aerial /
  drone-imagery VLM: scene captioning, VQA, and operational pointing (coarse 0-1000
  coordinates for landing / inspection cues). Explicitly NOT a flight controller /
  VLA — outputs are review cues requiring human validation; it emits text/JSON, not
  flight commands. Derived from Google Gemma-4-E2B-it (the ~2B-effective MatFormer
  variant; ~5B raw bf16 on disk, 10.3GB) — architecture Gemma4ForConditional
  Generation (vision tower + Gemma-4 LM). LICENSE: the repo declares apache-2.0, but
  the Gemma-4 base carries Google's Gemma Terms of Use — treat as review-required at
  publish (mirror the upstream LICENSE/NOTICE; publish may need
  --acknowledge-license-review).

  ARCHITECTURE (config.json): Gemma4ForConditionalGeneration, model_type gemma4 —
  THREE towers: vision (gemma4_vision, ViT hidden 768 / 16 layers / 12 heads /
  patch 16), text (gemma4_text, hidden 1536 / 35 layers, the ~2B LM), audio
  (gemma4_audio, unused for image inference). vision_soft_tokens_per_image + image
  token bookkeeping in the top-level config.

  WHY NOT THE WHOLE-VLM LANE: fabric's VLM export (coreai.vlm.export) gates on a
  hardcoded SUPPORTED_MODELS dict that is Qwen3-VL-ONLY (register_specs injects only
  Qwen3-VL specs); it does NOT handle Gemma-4. AND transformers 4.57.6 (fabric's
  pinned toolchain) has NO Gemma4 class, and the repo ships NO modeling code
  (trust_remote_code can't help). So the whole-VLM forward is not convertible with
  current tooling.

  DEPLOYABLE CORE = the gemma4_vision ENCODER (the proven graph_output_cosine
  image-feature-extraction lane, same as SenseNova's SigLIP / lingbot-vision-vit):
  image [1,3,S,S] -> per-patch feature tokens. Exported via a VENDORED standalone
  ViT (gemma4_vision geometry: pre-norm transformer, hidden 768, 16 layers, patch
  16), loading the vision_tower.* weights via a targeted safetensors slice out of
  model.safetensors. fp32; single static-size .aimodel. Host owns the image
  processor + the Gemma-4 LM + de-tokenization. GATE B = graph_output_cosine
  (identical seeded images through the fp32 torch vision tower vs the .aimodel, min
  cosine n_obs>=8) — conversion fidelity, not task accuracy. This mirrors exactly
  how SenseNova entered (whole model unsupported -> ship the vision encoder core).

  LICENSE: repo declares apache-2.0 but the Gemma-4 base carries Google's Gemma
  Terms of Use — review-required at publish (mirror LICENSE/NOTICE; may need
  --acknowledge-license-review).

  STATUS: draft — weights downloading (10.3GB). models/miril/export.py NOT YET
  WRITTEN (vendored gemma4_vision ViT, like SenseNova's planned driver). Next:
  write driver -> convert -> verify -> publish -> register. analyze verdict
  ("candidate lane Gemma4ForConditionalGeneration") logged to
  attempts/miril-drone-2b-1.jsonl.
