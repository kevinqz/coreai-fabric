notes: 'ACT (Action Chunking Transformer) policy — lerobot/act_aloha_sim_transfer_cube_human,
  apache-2.0. A DETERMINISTIC visuomotor policy: 1 camera (480x640) + proprioceptive state
  (14) -> a 100-step action chunk (14 dims), single forward pass (no VLM, no flow-matching
  sampler). SIM benchmark: trained on the ALOHA bimanual transfer-cube sim task — needs the
  ALOHA bimanual embodiment (or the sim) to actuate; the output is inert without the robot.
  Gate B = action_parity vs the torch reference on recorded frames (DETERMINISTIC — no noise
  to fix, single graph). Gate B action_parity = 1.0 min-cosine / 0.0 MAE over 8 frames (M4
  Max) — the export is NUMERICALLY EXACT vs the torch reference as loaded by lerobot 0.5.1.
  Proof-grade caveats, honestly: parity measured on fixed-seed observations (a deterministic
  policy exports identically regardless of input), and lerobot 0.5.1 warns on this older checkpoint''s
  normalization buffers (the asset faithfully reproduces the source AS LOADED). THE FIRST
  VLA/action conversion — proves the whole pipeline (two-venv export/lower + .aimodel + action_parity)
  before pi0.'
