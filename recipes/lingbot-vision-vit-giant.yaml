notes: 'LingBot-Vision ViT-g/16 (robbyant/lingbot-vision-vit-giant @ 3a5ba64c, apache-2.0)
  — the largest self-supervised vision backbone of the family for dense spatial perception
  (depth / segmentation features). Frozen ViT-g/16 (embed_dim 1536); same lane as lingbot-vision-vit-small
  (SDPA attention, op-coverage proven). Exported via models/lingbot/export.py as ONE static-size
  .aimodel: image [1,3,512,512] -> normalized per-patch tokens [1, 1024, 1536]. fp32; the
  host owns image preprocessing (resize to 512, ImageNet mean/std, patch 16). GATE B = graph_output_cosine
  (identical seeded images through the fp32 torch backbone vs the .aimodel, min cosine over
  n_obs=8) — conversion fidelity, not task accuracy. Upstream model class + weights via github.com/robbyant/lingbot-vision
  (only model.pt on HF). Real conversion via models/lingbot/{export,parity}.py.'
