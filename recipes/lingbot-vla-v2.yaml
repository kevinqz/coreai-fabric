  min_tool_version: 0.4.1
  args:
    weights: build/_lingbotvla/qwen_expert.safetensors
  quantization: float16
  precision: float32
  action:
    embodiment: multi_embodiment
    robot_required: true
    action_space:
      dim: 55
      max_action_dim: 55
      chunk_size: 32
      convention: per_embodiment_joint_space
    sampling:
      kind: flow_matching
      num_steps: 4
      solver: euler
    normalization:
      stats_source: upstream robot norm_stats; the split graph operates in the policy's normalized
        action space — the host un-normalizes. parity is measured in normalized space.
    graphs:
    - name: embed
    - name: block0
    - name: block1
    - name: block2
expected:
  format_version: '2.0'
  bundle_files:
  - metadata.json
  - manifest.json
  - programs/embed.aimodel/main.mlirb
  - programs/block0.aimodel/main.mlirb
  - programs/block1.aimodel/main.mlirb
  - programs/block2.aimodel/main.mlirb
parity:
  gate_a:
    checks:
    - bundle_files_present
    - metadata_json_parses
    - metadata_matches_recipe
  gate_b:
    metric: graph_output_cosine
    threshold: 0.999
    tolerance: 0.0005
    protocol:
      n_obs: 8
      reference_dtype: float32
      granularity: flattened
      graph_boundary: embed -> block0 -> block1 -> block2
      input_protocol: recorded
