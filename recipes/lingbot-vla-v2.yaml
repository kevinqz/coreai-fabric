notes: 'LOADS ON ANE + GATE B PASSES via GRAPH-SPLIT (2026-07-08): min graph_output_cosine
  0.99948 / median 0.99978 over 8 obs. The monolithic 36-layer dense-MoE graph exceeds the
  ANE single-program limit (0x10004 at both 3.58GB fp16 and 2.23GB int8 — a graph-complexity
  ceiling ~1.5GB for this structure, verified: fp16 L=12/14 load, L=18=1.79GB fails; int8
  L=18=1.11GB/L=24=1.48GB load). FIX: split the action expert into 4 loadable ANE programs
  — a tiny `embed` (state/action/time + rope) + 3 blocks of 12 layers (fp16, ~1.19GB each).
  The host chains them (embed -> block0 -> block1 -> block2) and loads the big blocks SEQUENTIALLY
  (load->run->free); they must not be co-resident in ANE memory (co-residency re-crosses the
  limit). Bundle is lingbot-vla-v2.aimodel/{metadata.json, manifest.json, programs/{embed,block0,block1,block2}.aimodel};
  manifest.json declares the chain + per-block prefix-K/V slices. fp16 (not int8: int8 experts
  dropped worst-obs to 0.9982 < gate; fp16 blocks are small enough to load and hit 0.99948).
  MoE dense-fused (all 32 experts + one-hot mask, exact vs sparse top-4, cosine 1.0). Eager
  attention (no SDPA). --- LingBot-VLA 2.0 (robbyant/lingbot-vla-v2-6b, Apache-2.0) — a brand-new
  (2026-07) robot VLA foundation model and the first MIXTURE-OF-EXPERTS VLA on Core AI. Coupled
  pi0-style shared-attention design: a Qwen3-VL-4B backbone runs alongside a parallel 36-layer
  action expert; per layer BOTH stacks compute q/k/v, they are concatenated, joint attention
  runs, then each applies its own o_proj + MLP. The action expert''s MLP is a Qwen2-MoE (32
  experts, top-4, sigmoid router + per-expert correction bias + 4.0 scaling + a shared expert),
  and the action denoise runs in the expert conditioned on the VLM''s cached per-layer K/V.
  This asset ships the `action_denoise_step`: given state + noisy actions + time + the Qwen3-VL
  prefix K/V (prefix_k/prefix_v, one pair per layer) + position_ids + attn_mask, it runs embed_suffix
  -> the 36-layer MoE expert (joint eager attention over the prepended prefix K/V, AdaRMSNorm(FiLM)
  time conditioning, dense-MoE MLP) -> action_out_proj -> velocity. The host owns the Qwen3-VL
  backbone (embed_prefix -> the prefix K/V), the Euler loop (num_steps=4) and un-normalization.
  TWO enabling techniques: (1) the MoE export blocker is solved by a DENSE rewrite — run all
  32 experts via an einsum over the checkpoint''s fused 3D expert weights, combined with a
  one-hot routing mask (zero for non-top-4); validated mathematically EXACT vs the sparse
  top-4 reference (cosine 1.0), no group_gemm / no data-dependent gather. (2) attention is
  EAGER (softmax matmul, matching the deploy policy) — no SDPA, so the macOS-27 mask-free
  FoldMultiplyIntoSDPAScale segfault is structurally avoided. FP16 (~3.6GB from 7.15GB fp32
  expert) — loads on the ANE (torchao int8 can''t einsum the 3D experts). GATE B = graph_output_cosine
  (fp32 torch MoE expert velocity vs the fp16 .aimodel over seeded inputs incl. synthetic
  per-layer VL K/V). action_dim 55, chunk 32. Real conversion via models/lingbotvla/export.py
  + the vendored standalone action_expert.py (norm/attention/decoder copied verbatim from
  the Apache-2.0 lingbotvla framework, MoE rewritten dense; loads the qwen_expert.* via a
  targeted 7.3GB safetensors range-fetch of the 6 shards — the 17.75GB Qwen3-VL backbone stays
  host-side).'
