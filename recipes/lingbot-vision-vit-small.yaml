notes: 'LingBot-Vision ViT-S/16 (robbyant/lingbot-vision-vit-small @ 127cbcec, apache-2.0)
  — a self-supervised vision backbone for dense spatial perception (depth / segmentation features).
  THE FIRST vision feature-extraction encoder converted to Core AI by fabric. Frozen ViT-S/16
  (embed_dim 384); op-coverage PROVEN on coreai_torch 0.4.1 / coremltools 9.0 (SDPA attention
  lowers). Exported via models/lingbot/export.py as ONE static-size .aimodel: image [1,3,512,512]
  -> normalized per-patch tokens [1, 1024, 384]. fp32; the host owns image preprocessing (resize
  to 512, ImageNet mean/std, patch 16 — see the upstream lingbot_vision.preprocess). GATE
  B = graph_output_cosine (identical seeded images through the fp32 torch backbone vs the
  .aimodel, min cosine over n_obs=8) — a conversion-fidelity metric, not downstream task accuracy.
  The upstream model class + weights come from the github.com/robbyant/lingbot-vision repo
  (only model.pt ships on HF). Real conversion via models/lingbot/{export,parity}.py.'
