notes: 'FastWAM (Fast World-Action Model, arXiv:2603.16666) — a LeRobot v0.6.0 world-action
  policy on the Wan2.2 stack (lerobot/fastwam_libero_uncond_2cam224 @ 53983e12, apache-2.0).
  Unlike LingBot-VA, FastWAM does DIRECT action prediction at inference (no test-time video
  rollout), so the deployable ACTION core is the separable `ActionDiT` (a Mixture-of-Transformers
  expert): action_encoder + text cross-attn + 30 DiT blocks + head. This asset ships the `action_denoise_step`
  velocity graph; the host owns the Wan VAE, UMT5 text encoder, the CFG + Euler action scheduler
  (num_steps=20), and the video expert''s prefilled per-layer K/V cache (fed to the graph
  as `vk`/`vv` inputs — the MoT action-cached cross-attention). NOTE: use the FINETUNED variant
  (has trained action heads); the base `fastwam_base` has none. INT8 weight-only (torchao)
  — the fp16 whole action-DiT would be large; int8 makes it ~4GB which loads on the ANE. TWO
  rewrites for coreai_torch 0.4.1: attn_mode="torch" (custom_sdpa, not the training-only flex_attention)
  + a REAL-valued RoPE rewrite (upstream freqs are complex; coreai_torch has no complex dtype)
  — the freqs BUFFER is also converted to real. GATE B = graph_output_cosine (velocity torch-ref
  vs the int8 .aimodel over seeded inputs incl. synthetic video K/V; min cosine 0.99999999999).
  Real conversion via models/fastwam/export.py + the int8 driver; standalone import of the
  Wan MoT modules (lerobot stubbed, tiny video-expert stub for MoT.__init__).'
