conversion:
  tool: models/smolvla/export.py
  precision: float32
  quantization: none
  action:
    embodiment: so_arm101
    robot_required: true
    action_space:
      dim: 6
      max_action_dim: 32
      max_state_dim: 32
      chunk_size: 50
      convention: so_arm101_6dof_joint_space
    sampling:
      kind: flow_matching
      num_steps: 10
      solver: euler
    normalization:
      stats_source: policy_preprocessor.json + policy_postprocessor.json (upstream); the split
        graphs operate in the policy's normalized action space — the host un-normalizes with
        the upstream processor stats. parity measured in normalized space.
    graphs:
    - name: encode
    - name: denoise_step
expected:
