notes: 'VQ-BeT (Lee et al. 2024) — lerobot/vqbet_pusht, apache-2.0. A visuomotor policy that
  maps a stack of 5 observations (1 camera 96x96 + agent-pos state 2) -> an action chunk (5
  steps x 2 dims) in a SINGLE forward pass (residual VQ-VAE codebook + minGPT + offset head).
  GREEDY/DETERMINISTIC variant: the source rollout picks codes with torch.multinomial (stochastic);
  this conversion selects codes by argmax (greedy) — a standard, valid deterministic inference
  mode — so the asset is reproducible and parity is exact. The card must NOT imply the stochastic
  sampler. Single-graph like ACT (the VQ codebook gather + argmax + GPT all lower on coremltools
  9.0). Gate B = action_parity of the greedy export vs the greedy torch reference (multinomial->argmax
  on BOTH sides). A vestigial mlp_hidden_dim config field (unused by lerobot 0.5.1''s architecture;
  state_dict loads clean without it) was stripped for load compat. PushT is a 2D planar pushing
  sim task — needs the sim/robot to actuate; the output is inert alone.'
