notes: 'pulpie-orange-large (feyninc/pulpie-orange-large @ 163a2b3e, apache-2.0) — the EuroBERT-2.1B
  token classifier of the pulpie family (HTML content vs boilerplate for web content extraction
  / RAG cleanup). Largest of the three; same non-autoregressive encoder lane as pulpie-orange-base
  (EuroBERT: RoPE + GQA, 32 layers, hidden 2304, vocab 128257, custom_code). Exported via
  models/eurobert/export.py as ONE static-seq (64) .aimodel: (input_ids, attention_mask) ->
  per-token logits [1, 64, 2]. fp32 (8.4GB); the host owns the EuroBERT tokenizer. GATE B
  = graph_output_cosine (identical seeded (input_ids, attention_mask) through the fp32 torch
  reference vs the .aimodel, min cosine over n_obs=8) — a conversion-fidelity metric, not
  task accuracy. Real conversion via models/eurobert/{export,parity}.py.'
