notes: 'Robometer-4B robot-policy reward model (lerobot/Robometer-4B @ db167a7c, apache-2.0)
  — a LeRobot v0.6.0 reward/progress model = a Qwen3-VL-4B-Instruct backbone + small MLP reward
  heads. Same split discipline as EVO1/VLA-JEPA/pi0: this asset ships the deployable task-specific
  CORE — the `reward_heads` graph (per-frame `<|prog_token|>` hidden states -> progress_logits
  [B,T,10 bins] + success_logits [B,T]). The host owns the Qwen3-VL-4B backbone (a standard
  VLM), the prog-token extraction, and the decode (progress = softmax-weighted bin-mean clamped
  to [0,1]; success = sigmoid). hidden_dim 2560, progress_discrete_bins 10, MAX_FRAMES 8 (heads
  are pointwise over the hidden dim, so the static graph covers any frame count). fp32. GATE
  B = graph_output_cosine (the non-AR encoder lane): fp32 torch reward heads vs the .aimodel
  over identical seeded per-frame hidden states, min cosine across BOTH output heads — a conversion-fidelity
  metric, not task success. Real conversion via models/robometer/{export,parity}.py (RobometerPredictionHead
  rebuilt standalone from the checkpoint progress_head.*/success_head.* tensors, dims inferred;
  no lerobot import needed).'
