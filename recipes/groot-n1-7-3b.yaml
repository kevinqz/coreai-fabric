notes: 'NVIDIA GR00T-N1.7-3B robot-policy (nvidia/GR00T-N1.7-3B @ 2fc962b9) — a LeRobot v0.6.0
  generalist VLA. NVIDIA Open Model License: derivatives may be redistributed but are NON-COMMERCIAL
  (research/evaluation only; §3.3) — this converted asset is a research-only derivative and
  bundles the upstream LICENSE. GR00T = Cosmos-Reason2-2B VL backbone + a flow-matching DiT
  action head, the same split discipline as EVO1/VLA-JEPA. This asset ships the deployable
  CORE — the `groot_denoise_step` velocity graph (AlternateVLDiT, 32 layers, inner 1536, cross-attn
  to the 2048-dim VL context, per-embodiment action/state MLPs over 32 embodiments, action_dim
  132, action_horizon 50); op-coverage PROVEN on coreai_torch 0.4.1 / coremltools 9.0 (the
  1.09B DiT lowers + loads clean, no MPSGraph segfault). The host owns the Cosmos-Reason2-2B
  backbone (+ its vl_self_attention/vlln context prep + state encoding), the Euler loop (num_inference_timesteps=4),
  and un-normalization — a separate context lane, like VLA-JEPA''s qwen_context. fp32. GATE
  B = action_parity: fp32 torch action head vs the .aimodel driven through the IDENTICAL 4-step
  Euler loop with fixed synthetic VL context + fixed noise, in normalized action space — a
  conversion-fidelity metric, not task success. Generalist checkpoint: needs a matching robot
  + post-training to actuate; inert without the robot. Real conversion via models/groot/{export,parity}.py
  (Gr00tN1d7ActionHead rebuilt standalone from Isaac-GR00T modules; loads model.action_head.*).'
